<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#04080f">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- BTC PRO v3.1 - BEST SETUP TAB -->
<title>BTC PRO v3.1 — Signal Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap');
:root{
  --bg:#04080f;--card:#09131e;--border:#162d45;
  --green:#00e676;--red:#ff1744;--yellow:#ffd600;
  --blue:#29b6f6;--purple:#ce93d8;--orange:#ffab40;--teal:#00bcd4;
  --text:#a8c8e8;--dim:#162d45;--white:#e8f4ff;
  --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden;}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(4,8,15,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:"Orbitron",sans-serif;font-size:0.82rem;font-weight:900;color:var(--white);letter-spacing:2px;}
.logo span{color:var(--yellow);}
.dev{font-family:"DM Mono",monospace;font-size:0.38rem;color:var(--dim);letter-spacing:1px;margin-top:1px;}
.top-right{display:flex;align-items:center;gap:6px;}
.live-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-family:"DM Mono",monospace;font-size:0.52rem;letter-spacing:2px;border:1px solid;}
.lp-live{background:rgba(0,230,118,0.08);border-color:rgba(0,230,118,0.25);color:var(--green);}
.lp-demo{background:rgba(255,214,0,0.08);border-color:rgba(255,214,0,0.25);color:var(--yellow);}
.live-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
/* IST BAR */
.ist-bar{margin:7px 12px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.ist-time{font-family:"Orbitron",sans-serif;font-size:0.95rem;font-weight:900;color:var(--white);}
.ist-lbl{font-family:"DM Mono",monospace;font-size:0.44rem;color:var(--dim);letter-spacing:2px;}
.session-pill{padding:3px 10px;border-radius:20px;font-family:"DM Mono",monospace;font-size:0.5rem;border:1px solid;}
.sess-hot{background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.3);color:var(--green);}
.sess-warm{background:rgba(255,171,64,0.1);border-color:rgba(255,171,64,0.3);color:var(--orange);}
.sess-cold{background:rgba(22,45,69,0.3);border-color:var(--border);color:var(--dim);}
/* PRICE HERO */
.price-hero{margin:6px 12px 0;background:linear-gradient(135deg,#0c1e32,#060f1a);border:1px solid var(--border);border-radius:16px;padding:13px;position:relative;overflow:hidden;}
.price-hero::before{content:"₿";position:absolute;right:-8px;top:-16px;font-size:6rem;font-family:"Orbitron",sans-serif;color:rgba(255,214,0,0.03);pointer-events:none;}
.ph-lbl{font-family:"DM Mono",monospace;font-size:0.48rem;color:var(--dim);letter-spacing:3px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;}
.ph-price{font-family:"Orbitron",sans-serif;font-size:1.85rem;font-weight:900;color:var(--white);transition:opacity .2s;}
.ph-chg{font-size:0.7rem;margin-top:3px;font-family:"DM Mono",monospace;}
.up{color:var(--green)}.down{color:var(--red)}
.ph-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px;}
.ph-stat{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:8px;padding:6px 8px;}
.phs-l{font-family:"DM Mono",monospace;font-size:0.44rem;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.phs-v{font-family:"DM Mono",monospace;font-size:0.72rem;}
/* TABS */
.tabs{display:flex;margin:7px 12px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:60px;padding:8px 4px;text-align:center;font-family:"DM Mono",monospace;font-size:0.46rem;color:var(--dim);letter-spacing:1px;cursor:pointer;border-right:1px solid var(--border);}
.tab:last-child{border-right:none;}
.tab.active{background:rgba(41,182,246,0.12);color:var(--blue);}
.tab-icon{font-size:0.85rem;display:block;margin-bottom:2px;}
.page{display:none;padding:8px 12px 0;}
.page.show{display:block;}
/* STYLE CARDS */
.style-section{margin-bottom:10px;}
.style-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:14px 14px 0 0;border:1px solid;}
.sh-scalp{background:rgba(206,147,216,0.08);border-color:var(--purple);}
.sh-day{background:rgba(41,182,246,0.08);border-color:var(--blue);}
.sh-swing{background:rgba(255,171,64,0.08);border-color:var(--orange);}
.sh-left{display:flex;align-items:center;gap:8px;}
.sh-name{font-family:"Orbitron",sans-serif;font-size:0.78rem;font-weight:900;}
.sh-scalp .sh-name{color:var(--purple);}
.sh-day .sh-name{color:var(--blue);}
.sh-swing .sh-name{color:var(--orange);}
.sh-tfs{font-family:"DM Mono",monospace;font-size:0.48rem;color:var(--dim);margin-top:2px;}
.sh-badge{font-family:"Orbitron",sans-serif;font-size:0.68rem;font-weight:900;padding:4px 11px;border-radius:20px;border:1px solid;}
.sb-buy{color:var(--green);border-color:var(--green);background:rgba(0,230,118,0.1);}
.sb-sell{color:var(--red);border-color:var(--red);background:rgba(255,23,68,0.1);}
.sb-wait{color:var(--yellow);border-color:var(--yellow);background:rgba(255,214,0,0.08);}
.sb-block{color:var(--purple);border-color:var(--purple);background:rgba(206,147,216,0.1);}
.style-body{background:var(--card);border:1px solid;border-top:none;border-radius:0 0 14px 14px;overflow:hidden;}
.sb-scalp-b{border-color:rgba(206,147,216,0.3);}
.sb-day-b{border-color:rgba(41,182,246,0.3);}
.sb-swing-b{border-color:rgba(255,171,64,0.3);}
/* TF ROW */
.tf-row{display:grid;border-bottom:1px solid var(--border);}
.tf-cell{padding:9px 6px;text-align:center;border-right:1px solid var(--border);}
.tf-cell:last-child{border-right:none;}
.tfc-role{font-family:"DM Mono",monospace;font-size:0.42rem;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.tfc-tf{font-family:"Orbitron",sans-serif;font-size:0.6rem;font-weight:900;color:var(--white);margin-bottom:3px;}
.tfc-sig{font-family:"Orbitron",sans-serif;font-size:0.62rem;font-weight:900;}
/* ENTRY BOX */
.entry-box{margin:10px 12px 6px;border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.eb-buy{background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.25);}
.eb-sell{background:rgba(255,23,68,0.07);border:1px solid rgba(255,23,68,0.25);}
.eb-wait{background:rgba(255,214,0,0.07);border:1px solid rgba(255,214,0,0.2);}
.eb-lbl{font-family:"DM Mono",monospace;font-size:0.46rem;color:var(--dim);letter-spacing:2px;margin-bottom:3px;}
.eb-val{font-family:"Orbitron",sans-serif;font-size:0.95rem;font-weight:900;color:var(--white);}
/* TP/SL */
.tpsl-wrap{padding:0 12px 10px;}
.tpsl-label{font-family:"DM Mono",monospace;font-size:0.46rem;letter-spacing:2px;margin:6px 0 5px;}
.tp-lbl{color:var(--green)}.sl-lbl{color:var(--red);}
.tpsl-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tp-box{background:rgba(0,230,118,0.06);border:1px solid rgba(0,230,118,0.15);border-radius:8px;padding:7px 9px;}
.sl-box{background:rgba(255,23,68,0.06);border:1px solid rgba(255,23,68,0.15);border-radius:8px;padding:7px 9px;}
.tpsl-name{font-family:"DM Mono",monospace;font-size:0.46rem;margin-bottom:2px;}
.tp-box .tpsl-name{color:var(--green);}.sl-box .tpsl-name{color:var(--red);}
.tpsl-pct{font-family:"DM Mono",monospace;font-size:0.44rem;float:right;}
.tp-box .tpsl-pct{color:rgba(0,230,118,0.6);}.sl-box .tpsl-pct{color:rgba(255,23,68,0.6);}
.tpsl-price{font-family:"Orbitron",sans-serif;font-size:0.72rem;font-weight:700;color:var(--white);}
/* RR BAR */
.rr-bar{margin:6px 12px;padding:7px 10px;background:rgba(0,0,0,0.2);border-radius:8px;border:1px solid var(--border);}
.rr-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.rr-lbl{font-family:"DM Mono",monospace;font-size:0.46rem;color:var(--dim);}
.rr-val{font-family:"DM Mono",monospace;font-size:0.46rem;}
.rr-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rr-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));}
/* ANALYSIS CARDS */
.an-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.an-head{padding:10px 14px;border-bottom:1px solid var(--border);font-family:"DM Mono",monospace;font-size:0.52rem;color:var(--blue);letter-spacing:3px;display:flex;align-items:center;justify-content:space-between;}
/* METER */
.meter-wrap{padding:12px 14px;}
.meter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.meter-label{font-family:"DM Mono",monospace;font-size:0.52rem;color:var(--text);min-width:90px;}
.meter-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 8px;}
.meter-fill{height:100%;border-radius:4px;transition:width 0.8s;}
.meter-val{font-family:"Orbitron",sans-serif;font-size:0.6rem;font-weight:900;min-width:55px;text-align:right;}
/* INDICATOR TABLE */
.ind-table{width:100%;border-collapse:collapse;}
.ind-table tr{border-bottom:1px solid rgba(22,45,69,0.4);}
.ind-table tr:last-child{border-bottom:none;}
.ind-table td{padding:8px 12px;font-family:"DM Mono",monospace;font-size:0.62rem;}
.ind-label{color:var(--dim);}
.ind-val{font-weight:700;text-align:right;}
.ind-signal{text-align:right;font-family:"Orbitron",sans-serif;font-size:0.55rem;font-weight:900;}
/* SCANNER */
.scan-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:6px;cursor:pointer;}
.coin-name{font-family:"Orbitron",sans-serif;font-size:0.75rem;font-weight:900;color:var(--white);}
.coin-price{font-family:"Orbitron",monospace;font-size:0.85rem;font-weight:700;color:var(--white);}
.coin-chg{font-family:"DM Mono",monospace;font-size:0.65rem;margin-top:2px;}
/* ALERTS */
.alert-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.ap-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ap-title{font-family:"DM Mono",monospace;font-size:0.52rem;color:var(--blue);letter-spacing:3px;}
.ap-toggle{font-size:0.58rem;font-family:"DM Mono",monospace;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;}
.ap-toggle.on{border-color:var(--green);color:var(--green);background:rgba(0,230,118,0.1);}
.toggle-switch{position:relative;width:36px;height:20px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:10px;cursor:pointer;transition:.3s;}
.toggle-slider:before{content:"";position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--dim);border-radius:50%;transition:.3s;}
.toggle-switch input:checked+.toggle-slider{background:var(--green);}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(16px);background:#fff;}
/* MISC */
.warn-box{margin:5px 12px 0;background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.35);border-radius:9px;padding:8px 11px;}
.block-box{margin:5px 12px 0;background:rgba(206,147,216,0.07);border:1px solid rgba(206,147,216,0.3);border-radius:9px;padding:8px 11px;}
.info-box{margin:5px 12px 0;background:rgba(255,214,0,0.06);border:1px solid rgba(255,214,0,0.2);border-radius:9px;padding:8px 11px;}
.mini-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:6px 12px;}
.mini-cell{background:rgba(0,0,0,0.2);border-radius:7px;padding:6px 7px;text-align:center;}
.mc-lbl{font-family:"DM Mono",monospace;font-size:0.42rem;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.mc-val{font-family:"Orbitron",sans-serif;font-size:0.55rem;font-weight:900;}
.advice-box{margin:6px 12px 10px;background:rgba(41,182,246,0.05);border:1px solid rgba(41,182,246,0.12);border-radius:9px;padding:9px 11px;font-size:0.7rem;line-height:1.7;color:var(--text);}
.advice-box strong{color:var(--white);}
.scan-filter-row{display:flex;gap:5px;margin-bottom:7px;overflow-x:auto;scrollbar-width:none;}
.scan-filter-row::-webkit-scrollbar{display:none;}
.sf-btn{flex-shrink:0;font-family:"DM Mono",monospace;font-size:0.5rem;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;}
.sf-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(41,182,246,0.1);}
.coin-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;}
.coin-modal.hidden{display:none;}
.cm-sheet{background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--border);width:100%;max-height:88vh;overflow-y:auto;padding:15px 13px calc(15px + var(--sab));}
.cm-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 13px;}
.cm-close{width:100%;margin-top:8px;background:rgba(41,182,246,0.1);border:1px solid rgba(41,182,246,0.3);color:var(--blue);font-family:"DM Mono",monospace;font-size:0.62rem;letter-spacing:2px;padding:10px;border-radius:10px;cursor:pointer;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-120px);background:#09131e;border:1px solid;border-radius:12px;padding:10px 15px;z-index:2000;min-width:250px;max-width:320px;transition:transform 0.3s;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-title{font-family:"Orbitron",sans-serif;font-size:0.65rem;font-weight:900;letter-spacing:2px;margin-bottom:3px;}
.toast-msg{font-size:0.7rem;color:var(--text);line-height:1.5;}
.toast.t-buy{border-color:var(--green)}.toast.t-buy .toast-title{color:var(--green);}
.toast.t-sell{border-color:var(--red)}.toast.t-sell .toast-title{color:var(--red);}
.toast.t-info{border-color:var(--blue)}.toast.t-info .toast-title{color:var(--blue);}
.toast.t-warn{border-color:var(--yellow)}.toast.t-warn .toast-title{color:var(--yellow);}
.toast.t-sess{border-color:var(--orange)}.toast.t-sess .toast-title{color:var(--orange);}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,8,15,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:7px 0 calc(7px + var(--sab));z-index:100;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:"DM Mono",monospace;font-size:0.44rem;color:var(--dim);padding:3px 4px;flex:1;min-width:0;}
.ni.active{color:var(--blue);}
.ni-icon{font-size:0.92rem;}
.fab{position:fixed;right:14px;bottom:calc(72px + var(--sab));width:38px;height:38px;background:linear-gradient(135deg,var(--blue),#0277bd);border-radius:50%;border:none;color:#fff;font-size:0.95rem;cursor:pointer;z-index:99;box-shadow:0 4px 18px rgba(41,182,246,0.35);display:flex;align-items:center;justify-content:center;}
.fab.spin{animation:fabspin .9s linear infinite;}
@keyframes fabspin{to{transform:rotate(360deg)}}
#app{padding-bottom:calc(63px + var(--sab));}
.upd{text-align:center;font-family:"DM Mono",monospace;font-size:0.52rem;color:var(--dim);margin:6px 0 3px;}
.disc{text-align:center;font-family:"DM Mono",monospace;font-size:0.48rem;color:var(--dim);padding:0 12px 4px;line-height:1.6;}
.src-b{display:inline-block;font-size:0.44rem;padding:1px 6px;border-radius:10px;margin-left:4px;}
.sb-live{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.sb-demo{background:rgba(255,214,0,0.1);color:var(--yellow);border:1px solid rgba(255,214,0,0.3);}
.pa-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--white);font-family:"DM Mono",monospace;font-size:0.75rem;outline:none;}
.nf-btn{flex-shrink:0;font-family:"DM Mono",monospace;font-size:0.5rem;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;}
.nf-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(41,182,246,0.1);}
.ot-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px 10px 34px;color:var(--white);font-family:"DM Mono",monospace;font-size:0.72rem;outline:none;}
#copy-toast{display:none;text-align:center;font-family:"DM Mono",monospace;font-size:0.58rem;color:var(--green);padding:4px;}
.al-item{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid rgba(22,45,69,0.3);}
.al-item:last-child{border-bottom:none;}
.al-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.al-text{font-size:0.68rem;color:var(--text);flex:1;line-height:1.5;}
.al-time{font-family:"DM Mono",monospace;font-size:0.55rem;color:var(--dim);}
.sess-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(22,45,69,0.3);}
.sess-row:last-child{border-bottom:none;}
.sess-row.active-sess{background:rgba(0,230,118,0.04);}
.sr-t{font-family:"Orbitron",sans-serif;font-size:0.62rem;color:var(--white);min-width:88px;}
.sr-now{font-family:"DM Mono",monospace;font-size:0.42rem;color:var(--green);background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);border-radius:10px;padding:1px 5px;margin-left:4px;}
</style>
</head>
<body>
<div class="toast" id="toast"><div class="toast-title" id="t-title"></div><div class="toast-msg" id="t-msg"></div></div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="logo" id="app-logo">₿TC <span>PRO</span></div>
      <div class="dev">by Pankaj Sharma</div>
    </div>
    <div class="top-right">
      <div style="font-size:1rem;cursor:pointer;" onclick="goTab('alerts');setNav('alerts')">🔔<span id="alert-count" style="display:none;position:relative;top:-6px;left:-4px;background:var(--red);border-radius:50%;width:13px;height:13px;font-size:0.44rem;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-family:DM Mono,monospace;"></span></div>
      <div class="live-pill lp-demo" id="top-pill"><div class="live-dot"></div><span id="pill-txt">DEMO</span></div>
    </div>
  </div>

  <div class="ist-bar">
    <div><div class="ist-lbl">IST TIME</div><div class="ist-time" id="ist-clock">--:--:--</div></div>
    <div id="sess-pill" class="session-pill sess-cold">--</div>
  </div>

  <div class="price-hero">
    <div class="ph-lbl">
      <span id="h-pair-lbl">BITCOIN / USDT</span>
      <div style="display:flex;align-items:center;gap:5px;">
        <span id="active-coin-name" style="font-family:Orbitron,sans-serif;font-size:0.58rem;font-weight:900;color:var(--yellow);">₿ BTC</span>
        <button onclick="goTab('scan');setNav('scan')" style="font-family:DM Mono,monospace;font-size:0.44rem;padding:2px 7px;border-radius:8px;border:1px solid var(--border);background:rgba(41,182,246,0.08);color:var(--blue);cursor:pointer;">CHANGE →</button>
